    <section class="contato-container">
        <div class="contato-card">
            <h2>🏎️ Pit Stop: Fale Conosco</h2>
            <p>Tem alguma sugestão de piloto ou rivalidade? Mande sua mensagem para a nossa equipe de box!</p>

            <form action="#" method="POST" class="formulario-contato">
                <div class="campo-grupo">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: Ayrton Senna da Silva" required>
                </div>

                <div class="campo-grupo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="campo-grupo">
                    <label for="assunto">Assunto</label>
                    <select id="assunto" name="assunto">
                        <option value="sugestao">Sugestão de Conteúdo</option>
                        <option value="erro">Relatar Erro no Site</option>
                        <option value="parceria">Parcerias</option>
                        <option value="outros">Outros</option>
                    </select>
                </div>

                <div class="campo-grupo">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva aqui sua mensagem..."
                        required></textarea>
                </div>

                <button type="submit" class="botao-enviar">Enviar Mensagem</button>
            </form>
        </div>
    </section>
